<!DOCTYPE html>
<html>
<head>
    <title>E-commerce Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
        }

        header {
            background: linear-gradient(90deg, #2c3e50, #4ca1af);
            color: white;
            padding: 18px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .container {
            padding: 25px;
        }

        /* KPI */
        .kpi-container {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .card {
            flex: 1;
            min-width: 250px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 5px;
            top: 0;
            left: 0;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
        }

        .card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }

        .card h3 {
            margin: 0;
            color: #777;
            font-weight: 500;
            font-size: 16px;
        }

        .card p {
            font-size: 28px;
            font-weight: bold;
            color: #2c3e50;
            margin-top: 12px;
        }

        .card:nth-child(1)::before {
            background: linear-gradient(90deg, #36d1dc, #5b86e5);
        }

        .card:nth-child(2)::before {
            background: linear-gradient(90deg, #11998e, #38ef7d);
        }

        .card:nth-child(3)::before {
            background: linear-gradient(90deg, #fc4a1a, #f7b733);
        }

        /* BUTTON */
        .btn {
            background: linear-gradient(45deg, #36d1dc, #5b86e5);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 18px rgba(0,0,0,0.2);
        }

        /* HEADINGS */
        h2 {
            margin-top: 30px;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        /* CHART */
        .chart-container {
            background: white;
            padding: 25px;
            margin-top: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        canvas {
            max-height: 320px;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 15px;
            background: #2c3e50;
            color: white;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<header>
    E-commerce Sales Dashboard
</header>

<div class="container">

    <!-- KPI -->
    <div class="kpi-container">
        <div class="card">
            <h3>💰 Total Sales</h3>
            <p id="sales"></p>
        </div>

        <div class="card">
            <h3>📦 Total Orders</h3>
            <p id="orders"></p>
        </div>

        <div class="card">
            <h3>📊 Avg Order Value</h3>
            <p id="avg"></p>
        </div>
    </div>

    <!-- DOWNLOAD -->
    <h2>Download Report</h2>
    <button class="btn" onclick="downloadCSV()">⬇ Download CSV</button>

    <!-- CATEGORY CHART -->
    <div class="chart-container">
        <canvas id="categoryChart"></canvas>
    </div>

    <!-- MONTH CHART -->
    <div class="chart-container">
        <canvas id="monthChart"></canvas>
    </div>

</div>

<footer>
    © 2026 E-commerce Dashboard | Built with Flask & Chart.js
</footer>

<script>
    // KPI
    fetch('/api/kpis')
    .then(res => res.json())
    .then(data => {
        document.getElementById('sales').innerText =
            "₹" + data.total_sales.toLocaleString();
        document.getElementById('orders').innerText =
            data.total_orders;
        document.getElementById('avg').innerText =
            "₹" + data.avg_order_value.toFixed(2);
    });

    // BAR CHART
    fetch('/api/sales_by_category')
    .then(res => res.json())
    .then(data => {
        const labels = data.map(d => d.product_category);
        const values = data.map(d => d.total_price);

        new Chart(document.getElementById('categoryChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Sales',
                    data: values,
                    backgroundColor: ['#3498db', '#2ecc71', '#e67e22'],
                    borderRadius: 8
                }]
            }
        });
    });

    // LINE CHART (SMOOTH)
    fetch('/api/sales_by_month')
    .then(res => res.json())
    .then(data => {
        const labels = data.map(d => d.month);
        const values = data.map(d => d.total_price);

        new Chart(document.getElementById('monthChart'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Monthly Sales',
                    data: values,
                    borderColor: '#3498db',
                    backgroundColor: 'rgba(52,152,219,0.2)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 5,
                    pointHoverRadius: 7
                }]
            },
            options: {
                interaction: {
                    mode: 'index',
                    intersect: false
                }
            }
        });
    });

    function downloadCSV() {
        window.open('/api/download_csv', '_blank');
    }
</script>

</body>
</html>
